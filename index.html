<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QRForge | Smart QR Generator</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="wrapper">
    <div class="topbar">
      <div>
        <h1>QRForge</h1>
        <p>Generate beautiful QR codes with custom colors and saved history.</p>
      </div>
    </div>

    <div class="dashboard">
      <section class="panel form-panel">
        <h2>Create QR Code</h2>

        <label for="qrInput">Text / URL / Content</label>
        <textarea id="qrInput" placeholder="Paste your link or content here..."></textarea>

        <div class="color-row">
          <div>
            <label for="foregroundColor">QR Color</label>
            <input type="color" id="foregroundColor" value="#111827" />
          </div>
          <div>
            <label for="backgroundColor">Background</label>
            <input type="color" id="backgroundColor" value="#ffffff" />
          </div>
        </div>

        <label for="qrSize">QR Size</label>
        <input type="range" id="qrSize" min="180" max="320" value="240" />
        <p class="size-label"><span id="sizeValue">240</span> px</p>

        <div class="button-row">
          <button id="generateBtn" class="primary-btn">Generate</button>
          <button id="downloadBtn" class="success-btn">Download</button>
          <button id="clearBtn" class="danger-btn">Clear</button>
        </div>
      </section>

      <section class="panel preview-panel">
        <h2>Preview</h2>
        <div id="qrPreviewBox">
          <div id="qrcode"></div>
        </div>
        <p id="statusText">Your QR will appear here.</p>
      </section>

      <section class="panel history-panel">
        <h2>Recent History</h2>
        <ul id="historyList"></ul>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
